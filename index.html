    <script>
      // Completely silence benign WebSocket/HMR errors and warnings in the sandboxed dev environment
      const suppressPatterns = ['WebSocket', 'vite', 'HMR', 'hmr'];
      
      const shouldSuppress = (msg) => {
        if (!msg) return false;
        const str = String(msg);
        return suppressPatterns.some(pattern => str.includes(pattern));
      };

      // Wrap console hooks to prevent cluttering logs
      const originalWarn = console.warn;
      const originalError = console.error;
      
      console.warn = function(...args) {
        if (args.some(arg => shouldSuppress(arg) || (arg && shouldSuppress(arg.message)))) return;
        originalWarn.apply(console, args);
      };

      console.error = function(...args) {
        if (args.some(arg => shouldSuppress(arg) || (arg && shouldSuppress(arg.message)))) return;
        originalError.apply(console, args);
      };

      window.addEventListener('unhandledrejection', function(event) {
        const reason = event.reason;
        if (reason && (
          shouldSuppress(reason.message) ||
          shouldSuppress(reason)
        )) {
          event.preventDefault();
          event.stopPropagation();
        }
      }, true);

      window.addEventListener('error', function(event) {
        if (event.message && shouldSuppress(event.message)) {
          event.preventDefault();
          event.stopPropagation();
        }
      }, true);
    </script>
